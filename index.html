<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT Spoken Transformer PRO v2</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 950px; margin: auto; }
        .upload-section { border: 2px dashed #334155; padding: 30px; text-align: center; border-radius: 15px; background: var(--card); margin-bottom: 20px; }
        .chunk-box { background: var(--card); margin-top: 15px; padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); }
        textarea { width: 100%; height: 120px; background: #000; color: #00ffcc; border: 1px solid #334155; border-radius: 5px; padding: 10px; font-size: 13px; margin-top: 10px; }
        button { cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; padding: 8px 15px; }
        .btn-copy { background: var(--primary); color: #000; }
        .btn-done { background: #f59e0b; color: #000; width: 100%; padding: 20px; font-size: 18px; margin-top: 30px; }
        .time-display { font-size: 11px; color: #64748b; font-family: monospace; display: block; margin-bottom: 2px; }
        .line-container { margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #334155; }
        .updated-text { color: #00ffcc; font-weight: 500; }
        pre { background: #111; padding: 15px; border-radius: 5px; font-size: 13px; overflow-x: auto; }
        input[type="file"] { display: none; }
        .file-label { background: #334155; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">SRT Spoken Transformer PRO v2</h2>
    
    <div class="upload-section">
        <label for="srtFile" class="file-label">Open SRT File</label>
        <input type="file" id="srtFile" accept=".srt">
        <p id="fileName" style="margin-top:10px;"></p>
    </div>

    <div id="outputArea"></div>
    <button id="doneBtn" class="btn-done" style="display:none;" onclick="downloadSRT()">Done & Download Updated SRT</button>
</div>

<script id="masterPromptTemplate" type="text/plain">
පහත දක්වා ඇති උපසිරැසි පේළි 10 ස්වාභාවික සිංහල කටවහරට (Spoken Sinhala) පරිවර්තනය කරන්න. ඉංග්‍රීසි තිබේ නම් සිංහලට හරවන්න. 

නීති:
1. ප්‍රතිදානය (Output) අනිවාර්යයෙන්ම HTML CODE BLOCK එකක් ඇතුළත ලබා දෙන්න (Direct copy කිරීමට හැකි වන පරිදි).
2. "අංකය. වාක්‍යය" යන ආකාරයට පමණක් ලබා දෙන්න. (උදා: 1. මොකද කරන්නේ?)
3. කිසිදු අමතර විස්තරයක් හෝ වචනයක් ලියන්න එපා.

මෙන්න පේළි 10:
</script>

<script>
let srtData = [];

document.getElementById('srtFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('fileName').innerText = "Loaded: " + file.name;
    const reader = new FileReader();
    reader.onload = function(event) { parseAndDisplay(event.target.result); };
    reader.readAsText(file);
});

function parseAndDisplay(content) {
    const outputArea = document.getElementById('outputArea');
    outputArea.innerHTML = '';
    srtData = [];

    const blocks = content.trim().split(/\n\s*\n/);
    let currentChunk = [];
    let chunkCounter = 1;

    blocks.forEach((block, index) => {
        const lines = block.split('\n').map(l => l.trim());
        if(lines.length >= 3) {
            const id = lines[0];
            const time = lines[1];
            const text = lines.slice(2).join(' ');
            const obj = { id, time, text, updatedText: text };
            srtData.push(obj);
            currentChunk.push(obj);

            if (currentChunk.length === 10 || index === blocks.length - 1) {
                renderChunkUI(currentChunk, chunkCounter++);
                currentChunk = [];
            }
        }
    });
    document.getElementById('doneBtn').style.display = 'block';
}

function renderChunkUI(chunk, chunkIndex) {
    const masterPrompt = document.getElementById('masterPromptTemplate').innerText;
    let copyLines = chunk.map(item => `${item.id}. ${item.text}`).join('\n');
    let finalPrompt = masterPrompt + "\n" + copyLines;

    const div = document.createElement('div');
    div.className = 'chunk-box';
    div.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <strong>කොටස ${chunkIndex}</strong>
            <button class="btn-copy" onclick="copyToClip(this, \`${finalPrompt.replace(/`/g, '\\`').replace(/\${/g, '\\${')}\`)">Copy Prompt</button>
        </div>
        <div id="preview-${chunkIndex}" style="background:#111; padding:10px; border-radius:5px; font-size:13px; max-height:200px; overflow-y:auto;">
            ${chunk.map(item => `
                <div class="line-container" id="line-wrapper-${item.id}">
                    <span class="time-display">[${item.id}] ${item.time}</span>
                    <span id="text-${item.id}">${item.text}</span>
                </div>
            `).join('')}
        </div>
        <textarea placeholder="Gemini දුන් Code එක මෙතනට Paste කරන්න..." oninput="realTimeUpdate(${chunkIndex}, this.value)"></textarea>
    `;
    document.getElementById('outputArea').appendChild(div);
}

function copyToClip(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
        btn.innerText = "Copied!"; btn.style.background = "#10b981";
        setTimeout(() => { btn.innerText = "Copy Prompt"; btn.style.background = "#00d2ff"; }, 2000);
    });
}

function realTimeUpdate(chunkIdx, val) {
    // Gemini දෙන code block එක ඇතුළේ තියෙන පේළි ටික වෙන් කරගන්නවා
    const lines = val.split('\n').filter(l => l.trim() !== '');
    const startIdx = (chunkIdx - 1) * 10;
    
    lines.forEach((line, i) => {
        // අංකය සහ වාක්‍යය වෙන් කරගැනීම
        const cleanText = line.replace(/^\d+[\.\)\s\-]+/, '').trim();
        const dataIndex = startIdx + i;

        if (srtData[dataIndex]) {
            srtData[dataIndex].updatedText = cleanText;
            // UI එකේ real-time update කිරීම
            const displayElem = document.getElementById(`text-${srtData[dataIndex].id}`);
            if (displayElem) {
                displayElem.innerText = cleanText;
                displayElem.className = "updated-text";
            }
        }
    });
}

function downloadSRT() {
    let finalSrt = "";
    srtData.forEach(item => {
        finalSrt += `${item.id}\n${item.time}\n${item.updatedText}\n\n`;
    });
    const blob = new Blob([finalSrt], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "Spoken_Sinhala_Updated.srt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
</script>

</body>
</html>
